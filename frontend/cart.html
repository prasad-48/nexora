<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Nexora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        boxShadow: {
          'card': '0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06)',
          'card-hover': '0 4px 12px rgba(0,0,0,0.06), 0 16px 32px rgba(0,0,0,0.10)',
        }
      }
    }
  }
</script>
</head>
<body class="font-sans bg-[#f7f7f9]">

<nav class="bg-[#0a0a0a] sticky top-0 z-50 border-b border-white/5">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="text-white text-xl font-extrabold tracking-tight">
      NEX<span class="text-indigo-500">ORA</span>
    </a>

    <div class="hidden md:flex items-center gap-8 text-[13px] font-medium text-gray-400">
      <a href="index.html" class="hover:text-white transition-colors">Home</a>
      <a href="index.html?category=Laptops" class="hover:text-white transition-colors">Laptops</a>
      <a href="index.html?category=Phones" class="hover:text-white transition-colors">Phones</a>
      <a href="index.html?category=Tablets" class="hover:text-white transition-colors">Tablets</a>
      <a href="index.html?category=Accessories" class="hover:text-white transition-colors">Accessories</a>
    </div>

    <div class="flex items-center gap-4">
      <a href="cart.html" class="relative w-9 h-9 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors text-white">
        <i class="ti ti-shopping-cart text-[18px]"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-indigo-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
      </a>
      <a href="orders.html" class="w-9 h-9 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors text-white">
        <i class="ti ti-package text-[18px]"></i>
      </a>
      <a href="login.html" id="nav-auth-link" class="w-9 h-9 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors text-white">
        <i class="ti ti-user text-[18px]"></i>
      </a>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-10 pb-24">
  <h1 class="text-2xl font-bold text-gray-900 mb-8">Your cart</h1>

  <div id="empty-state" class="hidden text-center py-24">
    <i class="ti ti-shopping-cart-off text-5xl text-gray-300 mb-4"></i>
    <h2 class="text-xl font-bold text-gray-900 mb-2">Your cart is empty</h2>
    <p class="text-sm text-gray-500 mb-6">Add some tech to get started.</p>
    <a href="index.html" class="inline-flex items-center gap-2 bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold px-6 py-3 rounded-xl transition-colors">
      <i class="ti ti-arrow-left text-sm"></i> Continue shopping
    </a>
  </div>

  <div id="cart-layout" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-2 space-y-4" id="cart-items"></div>

    <div class="lg:col-span-1">
      <div class="bg-white rounded-2xl shadow-card p-6 sticky top-24">
        <h2 class="text-lg font-bold text-gray-900 mb-4">Order summary</h2>
        <div class="flex justify-between text-sm text-gray-600 mb-2">
          <span>Subtotal</span>
          <span id="subtotal" class="font-semibold text-gray-900"></span>
        </div>
        <div class="border-t border-gray-100 my-4"></div>
        <div class="flex justify-between text-base font-bold text-gray-900 mb-6">
          <span>Total</span>
          <span id="total"></span>
        </div>

        <div id="checkout-login-prompt" class="hidden text-center py-4">
          <p class="text-sm text-gray-600 mb-4">Please sign in to place your order.</p>
          <a href="login.html" class="inline-flex items-center justify-center gap-2 w-full bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold py-3.5 rounded-xl transition-colors">
            <i class="ti ti-login text-lg"></i> Login or register
          </a>
        </div>

        <div id="checkout-form" class="hidden space-y-4">
          <div>
            <label for="address" class="block text-sm font-medium text-gray-700 mb-1.5">Delivery address</label>
            <textarea id="address" rows="3" required
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-0 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 placeholder:text-gray-400 resize-none"
              placeholder="Street, city, state, pin code..."></textarea>
          </div>
          <div id="order-error" class="hidden px-4 py-3 rounded-xl bg-red-50 text-red-600 text-sm border border-red-100"></div>
          <div id="order-success" class="hidden px-4 py-3 rounded-xl bg-green-50 text-green-700 text-sm border border-green-100"></div>
          <button type="button" id="place-order-btn"
            class="w-full bg-indigo-500 hover:bg-indigo-600 disabled:opacity-60 disabled:cursor-not-allowed text-white text-sm font-semibold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2">
            <span id="place-order-text">Place order</span>
            <span id="place-order-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="bg-[#0a0a0a] text-gray-400 py-12 px-6">
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
    <p class="text-white font-extrabold text-lg">NEX<span class="text-indigo-500">ORA</span></p>
    <p class="text-sm">&copy; 2026 Nexora. Built as a portfolio project by Prasad.</p>
  </div>
</footer>

<div id="chat-widget-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/chat.js"></script>
<script>
  function formatPrice(amount) {
    return '₹' + amount.toLocaleString('en-IN');
  }

  function renderCartItem(item) {
    const lineTotal = item.price * item.quantity;
    const imgSrc = item.image_url || 'https://placehold.co/80x80/f3f4f6/9ca3af?text=No+img';
    return `
      <div class="bg-white rounded-2xl shadow-card p-4 flex gap-4 items-center">
        <div class="w-20 h-20 rounded-xl bg-gray-50 overflow-hidden shrink-0">
          <img src="${imgSrc}" alt="${item.name}" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="text-sm font-semibold text-gray-900 truncate">${item.name}</h3>
          <p class="text-sm text-gray-500 mt-1">${formatPrice(item.price)} each</p>
          <div class="flex items-center gap-3 mt-3">
            <div class="flex items-center bg-gray-50 rounded-xl">
              <button type="button" onclick="changeQty(${item.id}, ${item.quantity - 1})"
                class="w-8 h-8 flex items-center justify-center text-gray-600 hover:text-gray-900 transition-colors">
                <i class="ti ti-minus text-xs"></i>
              </button>
              <span class="w-8 text-center text-sm font-semibold">${item.quantity}</span>
              <button type="button" onclick="changeQty(${item.id}, ${item.quantity + 1})"
                class="w-8 h-8 flex items-center justify-center text-gray-600 hover:text-gray-900 transition-colors">
                <i class="ti ti-plus text-xs"></i>
              </button>
            </div>
            <button type="button" onclick="removeItem(${item.id})"
              class="text-red-500 hover:text-red-600 text-xs font-medium flex items-center gap-1 transition-colors">
              <i class="ti ti-trash text-sm"></i> Remove
            </button>
          </div>
        </div>
        <div class="text-right shrink-0">
          <p class="text-sm font-bold text-gray-900">${formatPrice(lineTotal)}</p>
        </div>
      </div>
    `;
  }

  function changeQty(productId, newQty) {
    updateQuantity(productId, newQty);
    renderCart();
  }

  function removeItem(productId) {
    removeFromCart(productId);
    renderCart();
  }

  function updateSummary() {
    const total = getCartTotal();
    document.getElementById('subtotal').textContent = formatPrice(total);
    document.getElementById('total').textContent = formatPrice(total);
  }

  function renderCheckoutSection() {
    const isLoggedIn = localStorage.getItem('nexora_token');
    document.getElementById('checkout-login-prompt').classList.toggle('hidden', isLoggedIn);
    document.getElementById('checkout-form').classList.toggle('hidden', !isLoggedIn);
  }

  function renderCart() {
    const cart = getCart();
    const emptyState = document.getElementById('empty-state');
    const cartLayout = document.getElementById('cart-layout');
    const cartItems = document.getElementById('cart-items');

    if (cart.length === 0) {
      emptyState.classList.remove('hidden');
      cartLayout.classList.add('hidden');
      return;
    }

    emptyState.classList.add('hidden');
    cartLayout.classList.remove('hidden');
    cartItems.innerHTML = cart.map(renderCartItem).join('');
    updateSummary();
    renderCheckoutSection();
  }

  document.getElementById('place-order-btn').addEventListener('click', async () => {
    const address = document.getElementById('address').value.trim();
    const orderError = document.getElementById('order-error');
    const orderSuccess = document.getElementById('order-success');
    const btn = document.getElementById('place-order-btn');
    const spinner = document.getElementById('place-order-spinner');
    const btnText = document.getElementById('place-order-text');

    orderError.classList.add('hidden');
    orderSuccess.classList.add('hidden');

    if (!address) {
      orderError.textContent = 'Please enter a delivery address.';
      orderError.classList.remove('hidden');
      return;
    }

    const items = getCart().map((item) => ({
      product_id: item.id,
      quantity: item.quantity,
    }));

    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.textContent = 'Placing order...';

    try {
      await createOrder(address, items);
      clearCart();
      orderSuccess.textContent = 'Order placed successfully! Redirecting to your orders...';
      orderSuccess.classList.remove('hidden');
      setTimeout(() => {
        window.location.href = 'orders.html';
      }, 2000);
    } catch (err) {
      orderError.textContent = err.message || 'Failed to place order. Please try again.';
      orderError.classList.remove('hidden');
      btn.disabled = false;
      spinner.classList.add('hidden');
      btnText.textContent = 'Place order';
    }
  });

  renderCart();
  updateCartCount();
  updateNavAuth();
</script>
</body>
</html>
