<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Nexora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        boxShadow: {
          'card': '0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06)',
          'card-hover': '0 4px 12px rgba(0,0,0,0.06), 0 16px 32px rgba(0,0,0,0.10)',
        }
      }
    }
  }
</script>
</head>
<body class="font-sans bg-[#f7f7f9]">

<nav class="bg-[#0a0a0a] sticky top-0 z-50 border-b border-white/5">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="text-white text-xl font-extrabold tracking-tight">
      NEX<span class="text-indigo-500">ORA</span>
    </a>

    <div class="hidden md:flex items-center gap-8 text-[13px] font-medium text-gray-400">
      <a href="index.html" class="hover:text-white transition-colors">Home</a>
      <a href="index.html?category=Laptops" class="hover:text-white transition-colors">Laptops</a>
      <a href="index.html?category=Phones" class="hover:text-white transition-colors">Phones</a>
      <a href="index.html?category=Tablets" class="hover:text-white transition-colors">Tablets</a>
      <a href="index.html?category=Accessories" class="hover:text-white transition-colors">Accessories</a>
    </div>

    <div class="flex items-center gap-4">
      <a href="cart.html" class="relative w-9 h-9 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors text-white">
        <i class="ti ti-shopping-cart text-[18px]"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-indigo-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
      </a>
      <a href="orders.html" class="w-9 h-9 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors text-white">
        <i class="ti ti-package text-[18px]"></i>
      </a>
      <a href="login.html" id="nav-auth-link" class="w-9 h-9 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors text-white">
        <i class="ti ti-user text-[18px]"></i>
      </a>
    </div>
  </div>
</nav>

<main class="max-w-md mx-auto px-6 py-16">
  <div id="expired-banner" class="hidden mb-4 px-4 py-3 rounded-xl bg-amber-50 text-amber-800 text-sm border border-amber-200 text-center">
    Session expired. Please sign in again.
  </div>
  <div class="bg-white rounded-2xl shadow-card p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Welcome to Nexora</h1>
      <p class="text-sm text-gray-500 mt-2">Sign in or create an account to shop</p>
    </div>

    <div class="flex rounded-xl bg-gray-50 p-1 mb-6">
      <button type="button" id="tab-login" class="flex-1 py-2.5 text-sm font-semibold rounded-lg bg-gray-900 text-white transition-colors">
        Login
      </button>
      <button type="button" id="tab-register" class="flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:text-gray-900 transition-colors">
        Register
      </button>
    </div>

    <div id="form-error" class="hidden mb-4 px-4 py-3 rounded-xl bg-red-50 text-red-600 text-sm border border-red-100"></div>

  <!-- Login form -->
    <form id="login-form" class="space-y-4">
      <div>
        <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" id="login-email" required
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border-0 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 placeholder:text-gray-400"
          placeholder="you@example.com">
      </div>
      <div>
        <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input type="password" id="login-password" required
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border-0 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 placeholder:text-gray-400"
          placeholder="Your password">
      </div>
      <button type="submit" id="login-submit"
        class="w-full bg-indigo-500 hover:bg-indigo-600 disabled:opacity-60 disabled:cursor-not-allowed text-white text-sm font-semibold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2">
        <span id="login-submit-text">Sign in</span>
        <span id="login-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
      </button>
    </form>

  <!-- Register form -->
    <form id="register-form" class="space-y-4 hidden">
      <div>
        <label for="register-name" class="block text-sm font-medium text-gray-700 mb-1.5">Full name</label>
        <input type="text" id="register-name" required
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border-0 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 placeholder:text-gray-400"
          placeholder="John Doe">
      </div>
      <div>
        <label for="register-email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" id="register-email" required
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border-0 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 placeholder:text-gray-400"
          placeholder="you@example.com">
      </div>
      <div>
        <label for="register-password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input type="password" id="register-password" required minlength="6"
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border-0 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 placeholder:text-gray-400"
          placeholder="At least 6 characters">
      </div>
      <button type="submit" id="register-submit"
        class="w-full bg-indigo-500 hover:bg-indigo-600 disabled:opacity-60 disabled:cursor-not-allowed text-white text-sm font-semibold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2">
        <span id="register-submit-text">Create account</span>
        <span id="register-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
      </button>
    </form>
  </div>
</main>

<footer class="bg-[#0a0a0a] text-gray-400 py-12 px-6">
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
    <p class="text-white font-extrabold text-lg">NEX<span class="text-indigo-500">ORA</span></p>
    <p class="text-sm">&copy; 2026 Nexora. Built as a portfolio project by Prasad.</p>
  </div>
</footer>

<div id="chat-widget-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/chat.js"></script>
<script>
  if (localStorage.getItem('nexora_token')) {
    window.location.href = 'index.html';
  }

  if (new URLSearchParams(window.location.search).get('expired') === 'true') {
    document.getElementById('expired-banner').classList.remove('hidden');
  }

  const tabLogin = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');
  const formError = document.getElementById('form-error');

  function showError(message) {
    formError.textContent = message;
    formError.classList.remove('hidden');
  }

  function hideError() {
    formError.classList.add('hidden');
    formError.textContent = '';
  }

  function switchToLogin() {
    hideError();
    tabLogin.className = 'flex-1 py-2.5 text-sm font-semibold rounded-lg bg-gray-900 text-white transition-colors';
    tabRegister.className = 'flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:text-gray-900 transition-colors';
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
  }

  function switchToRegister() {
    hideError();
    tabRegister.className = 'flex-1 py-2.5 text-sm font-semibold rounded-lg bg-gray-900 text-white transition-colors';
    tabLogin.className = 'flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:text-gray-900 transition-colors';
    registerForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
  }

  tabLogin.addEventListener('click', switchToLogin);
  tabRegister.addEventListener('click', switchToRegister);

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const btn = document.getElementById('login-submit');
    const spinner = document.getElementById('login-spinner');
    const btnText = document.getElementById('login-submit-text');

    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.textContent = 'Signing in...';

    try {
      await loginUser(
        document.getElementById('login-email').value.trim(),
        document.getElementById('login-password').value
      );
      window.location.href = 'index.html';
    } catch (err) {
      showError(err.message || 'Login failed. Please try again.');
      btn.disabled = false;
      spinner.classList.add('hidden');
      btnText.textContent = 'Sign in';
    }
  });

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const btn = document.getElementById('register-submit');
    const spinner = document.getElementById('register-spinner');
    const btnText = document.getElementById('register-submit-text');

    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.textContent = 'Creating account...';

    try {
      await registerUser(
        document.getElementById('register-name').value.trim(),
        document.getElementById('register-email').value.trim(),
        document.getElementById('register-password').value
      );
      window.location.href = 'index.html';
    } catch (err) {
      showError(err.message || 'Registration failed. Please try again.');
      btn.disabled = false;
      spinner.classList.add('hidden');
      btnText.textContent = 'Create account';
    }
  });

  updateCartCount();
  updateNavAuth();
</script>
</body>
</html>
